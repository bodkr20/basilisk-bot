<!DOCTYPE html>
<html>
<head>
    <title>Basilisk Scanner</title>
</head>
<body style="background:#0a0a1a;color:#fff;font-family:sans-serif;padding:20px;">
    <h1>🦎 Basilisk Scanner</h1>
    <p id="status">⏳ جاري التحميل...</p>
    <pre id="data" style="background:#1a1a3e;padding:15px;border-radius:8px;"></pre>
    <button onclick="fetchData()" style="background:#7b2ffc;color:#fff;border:none;padding:10px 20px;border-radius:5px;">تحديث</button>
    <script>
        async function fetchData() {
            try {
                const res = await fetch('https://basilisk-api.onrender.com/api/status');
                const data = await res.json();
                document.getElementById('status').innerHTML = '🟢 متصل';
                document.getElementById('data').textContent = JSON.stringify(data, null, 2);
            } catch(e) {
                document.getElementById('status').innerHTML = '🔴 غير متصل: ' + e.message;
                document.getElementById('data').textContent = 'خطأ: ' + e.message;
            }
        }
        fetchData();
        setInterval(fetchData, 5000);
    </script>
</body>
</html>
